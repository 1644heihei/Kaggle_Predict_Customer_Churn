# EXP004: XGBoost + Optuna ハイパーパラメータ自動最適化
# 目的: Optunaを使ったハイパーパラメータの自動最適化 → CV AUC最大化

data:
  train_path: "data/train.csv"
  test_path: "data/test.csv"

target:
  name: "Churn"

cv:
  n_splits: 5
  random_state: 42
  shuffle: true

model:
  name: "xgboost"
  base_params:
    objective: "binary:logistic"
    eval_metric: "logloss"
    tree_method: "gpu_hist"
    device: "cuda"
    random_state: 42

training:
  num_iterations: 500
  early_stopping_rounds: 50
  verbose_eval: 20

optuna:
  enabled: true
  n_trials: 100  # 試行回数
  n_jobs: 1      # 並列実行数
  sampler: "tpe" # TPE (Tree-structured Parzen Estimator) を使用
  direction: "maximize"  # 最大化（AUC）
  study_name: "xgboost_optimization"
  
  # ハイパラサーチ空間
  hyperparams:
    max_depth:
      type: "int"
      low: 3
      high: 10
    learning_rate:
      type: "float"
      low: 0.001
      high: 0.3
      log: true
    subsample:
      type: "float"
      low: 0.5
      high: 1.0
    colsample_bytree:
      type: "float"
      low: 0.5
      high: 1.0
    min_child_weight:
      type: "int"
      low: 1
      high: 10
    gamma:
      type: "float"
      low: 0
      high: 5
    reg_alpha:
      type: "float"
      low: 0
      high: 1
    reg_lambda:
      type: "float"
      low: 0
      high: 2

class_weight:
  enabled: true
  method: "balanced"

feature_engineering:
  enabled: true
  interactions:
    - ["MonthlyCharges", "tenure"]
    - ["TotalCharges", "tenure"]
  count_services: true
  group_features: true

# 注記: Optuna による自動ハイパーパラメータ最適化で最良のモデルを探索
# 結果は outputs/child-exp000/optuna_study.db に保存される
