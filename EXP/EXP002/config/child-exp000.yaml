# EXP002 - child-exp000: LightGBM + Feature Engineering

# Model Configuration
model:
  type: "lightgbm"
  params:
    num_leaves: 100
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    lambda_l1: 0.0
    lambda_l2: 0.0
    verbose: -1

# Cross-Validation Configuration
cv:
  n_splits: 5
  stratify: true
  random_state: 42
  method: "stratified_kfold"

# Training Configuration
training:
  num_iterations: 500
  early_stopping_rounds: 50
  eval_metric: "auc"
  verbose_eval: 20
  verbose: true

# Class Weight (不均衡対策)
class_weight:
  enabled: true
  method: "balanced"

# Target Configuration
target:
  name: "Churn"
  type: "binary"

# Data Configuration
data:
  train_path: "data/train.csv"
  test_path: "data/test.csv"
  random_seed: 42

# Feature Engineering Configuration
features:
  use_categorical: true
  use_numerical: true
  encoding: "label"
  scale: false
  
feature_engineering:
  enabled: true
  # 相互作用項
  interactions:
    - ["MonthlyCharges", "tenure"]
    - ["TotalCharges", "tenure"]
  # Polynomial features
  polynomials: []
  # Service count
  count_services: true
  # カテゴリグループ化
  group_features: true

# Output Configuration
output:
  save_oof: true
  save_model: true
  save_importance: true
